name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scala: ["2.12.18", "2.13.12", "3.3.1"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Compile
        run: sbt ++${{ matrix.scala }} compile

      - name: Compile tests
        run: sbt ++${{ matrix.scala }} Test/compile

      - name: Run booktest (sequential)
        run: sbt ++${{ matrix.scala }} "Test/runMain booktest.BooktestMain examples"

      - name: Run booktest (parallel)
        run: sbt ++${{ matrix.scala }} "Test/runMain booktest.BooktestMain -p4 examples"

      - name: Run meta tests
        run: sbt ++${{ matrix.scala }} "Test/runMain booktest.BooktestMain test"
